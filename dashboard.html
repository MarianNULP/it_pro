<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Інфраструктура PRO - Дашборд</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-server me-2 text-primary"></i>IT Infra
                PRO</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <button class="btn btn-outline-light ms-2 shadow-sm fw-bold" data-bs-toggle="offcanvas"
                        data-bs-target="#settingsPanel">
                        <i class="fa-solid fa-gear me-1"></i> Налаштування
                    </button>
                    <li class="nav-item"><a class="nav-link" href="index.html"><i
                                class="fa-solid fa-map-location-dot me-1"></i> Топологія</a></li>
                    <li class="nav-item"><a class="nav-link" href="devices.html"><i
                                class="fa-solid fa-desktop me-1"></i> Обладнання</a></li>
                    <li class="nav-item"><a class="nav-link active" href="dashboard.html"><i
                                class="fa-solid fa-ticket-simple me-1"></i> Система Тікетів</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0"><i class="fa-solid fa-clipboard-list me-2 text-primary"></i>Активні інциденти</h2>
            <button class="btn btn-danger fw-bold" onclick="openTicketModal()"><i
                    class="fa-solid fa-plus me-2"></i>Створити інцидент</button>
        </div>

        <div class="row mb-3">
            <div class="col-md-5">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white border-end-0"><i
                            class="fa-solid fa-magnifying-glass text-muted"></i></span>
                    <input type="text" id="searchTicketInput" class="form-control border-start-0"
                        placeholder="Пошук за комп'ютером, темою або описом...">
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-select shadow-sm" id="statusTicketFilter">
                    <option value="all">Усі статуси</option>
                    <option value="new">Нове</option>
                    <option value="in_progress">В роботі</option>
                    <option value="unresolved">Немає рішення</option>
                    <option value="completed">Виконано</option>
                </select>
            </div>
            <div class="col-md-4">
                <select class="form-select shadow-sm" id="sortTicketFilter">
                    <option value="date_desc">Сортувати: Спочатку нові</option>
                    <option value="date_asc">Сортувати: Спочатку старі</option>
                    <option value="priority_desc">Сортувати: Критичні пріоритети</option>
                </select>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Обладнання</th>
                                <th>Тема проблеми</th>
                                <th>Опис</th>
                                <th>Пріоритет</th>
                                <th>Дата створення</th>
                                <th class="text-end">Дія</th>
                            </tr>
                        </thead>
                        <tbody id="tickets-table-body">
                            <tr>
                                <td colspan="7" class="text-center py-4 text-muted">
                                    <i class="fa-solid fa-spinner fa-spin me-2"></i>Завантаження даних...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="dashboardTicketModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title fw-bold">Новий інцидент</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="dashboardTicketForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Оберіть обладнання зі списку</label>
                            <select class="form-select" id="ticket_device_select" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Тема проблеми</label>
                            <input type="text" class="form-control" id="ticket_subject" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Опис</label>
                            <textarea class="form-control" id="ticket_description" rows="3" required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Пріоритет</label>
                            <select class="form-select" id="ticket_priority">
                                <option value="low">Низький</option>
                                <option value="medium" selected>Середній</option>
                                <option value="high">Високий</option>
                                <option value="critical">Критичний</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 fw-bold">Відкрити тікет</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/dashboard.js"></script>

</body>

</html>
